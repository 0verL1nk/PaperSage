name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [synchronize, opened, reopened]
  push:
    branches:
      - 'feat/*'
      - 'fix/*'
      - 'feature/*'
      - 'refactor/*'
      - 'chore/*'

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch PR head branch for cross-repository PRs
        run: |
          # Try to get PR number from different event types
          PR_NUMBER=""
          
          if [ "${{ github.event_name }}" == "pull_request_review_comment" ] || [ "${{ github.event_name }}" == "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "issue_comment" ]; then
            # Check if this comment is on a PR
            if [ -n "${{ github.event.issue.pull_request.url }}" ]; then
              # Extract PR number from the pull_request URL
              PR_NUMBER=$(echo "${{ github.event.issue.pull_request.url }}" | grep -oP 'pulls/\K[0-9]+')
            fi
          elif [ "${{ github.event_name }}" == "push" ]; then
            # For push events, try to find associated PR
            BRANCH_NAME="${{ github.ref_name }}"
            PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          fi
          
          if [ -n "$PR_NUMBER" ]; then
            # Check if it's a cross-repository PR
            HEAD_REPO=$(gh pr view $PR_NUMBER --json headRepositoryOwner -q '.headRepositoryOwner.login' 2>/dev/null || echo "")
            if [ "$HEAD_REPO" != "${{ github.repository_owner }}" ] && [ -n "$HEAD_REPO" ]; then
              echo "Cross-repository PR detected, fetching head branch..."
              gh pr checkout $PR_NUMBER --depth 1
            else
              # For same-repository PRs, checkout the PR branch
              gh pr checkout $PR_NUMBER --depth 1 2>/dev/null || echo "Not a PR or checkout failed, using current branch"
            fi
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_OPUS_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Use the workflow token for GitHub API calls so comment updates remain valid
          # throughout the full job, even when Claude runs long enough for app tokens to age out.
          github_token: ${{ github.token }}
          settings: |
            {
              "env": {
                "ANTHROPIC_API_KEY": "${{ secrets.ANTHROPIC_API_KEY }}",
                "ANTHROPIC_BASE_URL": "${{ secrets.ANTHROPIC_BASE_URL }}",
                "ANTHROPIC_DEFAULT_HAIKU_MODEL": "${{ secrets.ANTHROPIC_DEFAULT_HAIKU_MODEL }}",
                "ANTHROPIC_DEFAULT_OPUS_MODEL": "${{ secrets.ANTHROPIC_DEFAULT_OPUS_MODEL }}",
                "ANTHROPIC_DEFAULT_SONNET_MODEL": "${{ secrets.ANTHROPIC_DEFAULT_SONNET_MODEL }}",
                "ANTHROPIC_MODEL": "${{ secrets.ANTHROPIC_MODEL }}"
              }
            }
          claude_args: |
            --allowedTools "Bash(bun install),Bash(bun test:*),Bash(bun run format),Bash(bun typecheck)"
            --model "${{ secrets.ANTHROPIC_MODEL }}"
