name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - name: Resolve PR context
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            if (context.eventName === "pull_request_review_comment") {
              prNumber = context.payload.pull_request?.number ?? null;
            } else if (context.eventName === "issue_comment" && context.payload.issue?.pull_request) {
              prNumber = context.payload.issue.number;
            }

            if (!prNumber) {
              core.setOutput("is_pr", "false");
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const sameRepo = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;

            core.setOutput("is_pr", "true");
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("head_repo", pr.head.repo.full_name);
            core.setOutput("same_repo", sameRepo ? "true" : "false");

      - name: Skip unsupported fork PRs
        if: steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.same_repo != 'true'
        run: |
          echo "Skipping Claude run for fork PR to avoid branch fetch failure."
          echo "PR #${{ steps.pr.outputs.pr_number }} head=${{ steps.pr.outputs.head_repo }}:${{ steps.pr.outputs.head_ref }}"

      - name: Checkout repository
        if: steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.same_repo == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ steps.pr.outputs.head_ref }}

      - uses: anthropics/claude-code-action@v1
        if: steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.same_repo == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model ${{ vars.CLAUDE_MODEL || secrets.CLAUDE_MODEL || 'claude-sonnet-4-6' }} --append-system-prompt "${{ vars.SYSTEM_PROMPT || secrets.SYSTEM_PROMPT }}"
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || secrets.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
