name: PR Review

on:
  pull_request:
    types: [opened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install development dependencies
        run: uv sync --extra dev --no-install-project

      - name: Fetch PR head branch for cross-repository PRs
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          # Check if it's a cross-repository PR
          HEAD_REPO=$(gh pr view $PR_NUMBER --json headRepositoryOwner -q '.headRepositoryOwner.login' 2>/dev/null || echo "")
          if [ "$HEAD_REPO" != "${{ github.repository_owner }}" ] && [ -n "$HEAD_REPO" ]; then
            echo "Cross-repository PR detected, fetching head branch..."
            gh pr checkout $PR_NUMBER --depth 1
          fi

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_OPUS_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        with:
          allowed_bots: "*"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Use the workflow token for GitHub API calls so comment updates remain valid
          # throughout the full job, even when Claude runs long enough for app tokens to age out.
          github_token: ${{ github.token }}
          settings: |
            {
              "env": {
                "ANTHROPIC_API_KEY": "${{ secrets.ANTHROPIC_API_KEY }}",
                "ANTHROPIC_BASE_URL": "${{ secrets.ANTHROPIC_BASE_URL }}",
                "ANTHROPIC_DEFAULT_HAIKU_MODEL": "${{ secrets.ANTHROPIC_DEFAULT_HAIKU_MODEL }}",
                "ANTHROPIC_DEFAULT_OPUS_MODEL": "${{ secrets.ANTHROPIC_DEFAULT_OPUS_MODEL }}",
                "ANTHROPIC_DEFAULT_SONNET_MODEL": "${{ secrets.ANTHROPIC_DEFAULT_SONNET_MODEL }}",
                "ANTHROPIC_MODEL": "${{ secrets.ANTHROPIC_MODEL }}"
              },
              "hooks": {
                "PreToolUse": [
                  {
                    "matcher": "Bash",
                    "hooks": [
                      {
                        "type": "command",
                        "command": "python3 \"$CLAUDE_PROJECT_DIR/scripts/claude_pre_git_commit_hook.py\""
                      }
                    ]
                  }
                ]
              }
            }

          prompt: "/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}"
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
            --model "${{ secrets.ANTHROPIC_MODEL }}"
